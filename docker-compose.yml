version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: thapamart-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: thapamart-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/thapamart
      - JWT_SECRET=ChangeMeToSomethingHighlySecure123
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: thapamart-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
