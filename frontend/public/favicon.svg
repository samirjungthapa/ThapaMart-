<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="55%" stop-color="#7C6EF7"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square badge -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#lg1)" filter="url(#glow)"/>

  <!-- Inner highlight ring -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Shopping bag outline - stylized T shape -->
  <!-- Bag handle -->
  <path d="M17 19 C17 14 31 14 31 19" stroke="url(#lg2)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Bag body -->
  <rect x="13" y="19" width="22" height="17" rx="3.5" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Shine dot on bag -->
  <circle cx="24" cy="27.5" r="2" fill="rgba(255,255,255,0.7)"/>
  <path d="M21.5 27.5 L26.5 27.5" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
</svg>